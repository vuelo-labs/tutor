[build]
  # Build command: compile the React app with Vite
  # publish: the root "." serves the landing page (index.html)
  # The React app build output (app-dist/) is served at /app via the redirect below
  command = "cd app && npm install && npm run build"
  publish = "."

# Netlify Functions config
# Functions are Node.js code that runs server-side on Netlify's infrastructure
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# This rewrites /api/subscribe → the subscribe.js function
[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

# This rewrites /api/claude → the claude.js function
# So the frontend calls /api/claude (a relative URL, no domain hardcoded)
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

# Serve the React app at /app — any path under /app/* is handled by the
# React app's index.html (client-side routing). The 200 status means
# "serve this file, don't redirect" — essential for single-page apps.
# SPA fallback: any unknown path under /engine serves the React app's index.html
# Netlify serves /engine/ as a real directory (built by Vite), no rewriting needed
[[redirects]]
  from = "/engine/*"
  to = "/engine/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
